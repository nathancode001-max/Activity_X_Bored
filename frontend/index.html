<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Bored</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">

    <h1 class="alegreya-sans-sc-black">Let's find something for you to do ✌️</h1>

    <div class="controls">
        
        <select>
            <option value="">Random type</option>
            <option value="education">Education</option>
            <option value="charity">Charity</option>
            <option value="recreational">Recreational</option>
            <option value="relaxation">Relaxation</option>
            <option value="busywork">Busywork</option>
            <option value="social">Social</option>
            <option value="diy">DIY</option>
            <option value="music">Music</option>
        </select>

        <select>
            <option value="">Any number of people</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>

        <button>Go</button>
    </div>

    <div class="activity-card">
        <h2>Draw and color a Mandala </h2>

        <div class="activity-info">
            <span class="tag">😌 Relaxation</span>
            <span>👥 Participants: 1</span>
        </div>

    </div>

</div>
</body>
</html>
